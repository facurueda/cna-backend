services:
  postgres:
    image: postgres:16
    container_name: vyro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vyro_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vyro_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyro_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}

      # Cognito (luego los llenamos)
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      COGNITO_REGION: ${COGNITO_REGION}

      # S3 (luego los llenamos)
      AWS_REGION: ${AWS_REGION}
      S3_CLIPS_BUCKET: ${S3_CLIPS_BUCKET}
      S3_BACKUPS_BUCKET: ${S3_BACKUPS_BUCKET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vyro_net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: vyro_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    networks:
      - vyro_net

volumes:
  vyro_pg:

networks:
  vyro_net:
